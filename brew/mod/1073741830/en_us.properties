# Available date formats:

date.bundle1.display=M/D/Y
date.bundle1.longformat=dddd, MMMM dd, yyyy
date.bundle1.shortformat=M/d/yy
date.bundle1.noyearformat=M/d
date.bundle1.separator=/

date.bundle2.display=Y-M-D
date.bundle2.longformat=dddd, MMMM dd, yyyy 
date.bundle2.shortformat=yyyy-MM-dd
date.bundle2.noyearformat=MM-dd
date.bundle2.separator=/

date.default=bundle1



# Available time formats:
time.bundle1.display=h:mm:ss
time.bundle1.format=h:mm:ss pp
time.bundle1.nosecformat=h:mm pp
time.bundle1.separator=:

time.bundle2.display=H:mm:ss
time.bundle2.format=H:mm:ss
time.bundle2.nosecformat=H:mm
time.bundle2.separator=:

time.default=bundle1



